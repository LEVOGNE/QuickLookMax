name: QuickLookMax

options:
  deploymentTarget:
    macOS: "13.0"
  bundleIdPrefix: com.quicklookmax
  createIntermediateGroups: true
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: GKTDLS7Q7V

targets:

  QuickLookMax:
    type: application
    platform: macOS
    sources:
      - path: QuickLookMax
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quicklookmax.app
        PRODUCT_NAME: QuickLookMax
        INFOPLIST_FILE: QuickLookMax/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickLookMax/QuickLookMax.entitlements
    dependencies:
      - target: QuickLookMaxExtension
        embed: true
        embedType: plugins

  QuickLookMaxExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: QuickLookMaxExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.quicklookmax.app.extension
        PRODUCT_NAME: QuickLookMaxExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        INFOPLIST_FILE: QuickLookMaxExtension/Info.plist
        CODE_SIGN_ENTITLEMENTS: QuickLookMaxExtension/QuickLookMaxExtension.entitlements
    dependencies:
      - sdk: Quartz.framework
      - sdk: WebKit.framework
